<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Bet Code Converter</title>
  <style>
    :root { --bg:#f7f8fa; --card:#fff; --ink:#0f172a; --muted:#64748b; --brand:#1f6feb; --err:#b91c1c; --errbg:#fee2e2; --ok:#ecfdf5; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 2rem 1rem; }
    .wrap { max-width: 520px; margin: 0 auto; background: var(--card); padding: 1.75rem; border-radius: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.04); }
    h1 { margin: 0 0 .25rem; font-size: 1.4rem; }
    .sub { color: var(--muted); font-size: .9rem; margin: 0 0 1.25rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    label { display: block; font-size: .8rem; color: var(--muted); margin: .75rem 0 .25rem; }
    select, input { width: 100%; padding: .7rem; font-size: 1rem; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; }
    input:focus, select:focus { outline: 2px solid var(--brand); outline-offset: -1px; }
    button { width: 100%; margin-top: 1.25rem; padding: .8rem; font-size: 1rem; font-weight: 600; background: var(--brand); color: white; border: 0; border-radius: 8px; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .result { margin-top: 1.25rem; padding: 1rem; border-radius: 10px; background: var(--ok); display: none; }
    .result.show { display: block; }
    .result.error { background: var(--errbg); color: var(--err); }
    .code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; margin: .35rem 0; }
    .meta { font-size: .8rem; color: var(--muted); }
    .copy { margin-top: .5rem; background: transparent; color: var(--brand); border: 1px solid var(--brand); padding: .4rem .8rem; font-size: .85rem; width: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Free Bet Code Converter</h1>
    <p class="sub">Paste a booking code, pick the destination bookie, and stake the same selections elsewhere.</p>

    <div class="row">
      <div>
        <label for="from">From</label>
        <select id="from">
          <option value="sportybet">Sportybet</option>
          <option value="bet9ja">Bet9ja</option>
          <option value="1xbet">1xBet</option>
          <option value="betway">Betway</option>
          <option value="betking">BetKing</option>
          <option value="msport">MSport</option>
          <option value="paripesa">Paripesa</option>
          <option value="22bet">22Bet</option>
          <option value="betwinner">BetWinner</option>
          <option value="melbet">Melbet</option>
          <option value="helabet">Helabet</option>
          <option value="betpawa">BetPawa</option>
        </select>
      </div>
      <div>
        <label for="to">To</label>
        <select id="to">
          <option value="1xbet">1xBet</option>
          <option value="sportybet">Sportybet</option>
          <option value="bet9ja">Bet9ja</option>
          <option value="betway">Betway</option>
          <option value="betking">BetKing</option>
          <option value="msport">MSport</option>
          <option value="paripesa">Paripesa</option>
          <option value="22bet">22Bet</option>
          <option value="betwinner">BetWinner</option>
          <option value="melbet">Melbet</option>
          <option value="helabet">Helabet</option>
          <option value="betpawa">BetPawa</option>
        </select>
      </div>
    </div>

    <label for="code">Booking code</label>
    <input id="code" type="text" placeholder="e.g. B3US96U" autocomplete="off" />

    <button id="convert">Convert</button>

    <div id="result" class="result"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const btn = $("convert");
    const out = $("result");

    btn.addEventListener("click", convert);
    $("code").addEventListener("keydown", (e) => { if (e.key === "Enter") convert(); });

    async function convert() {
      const from = $("from").value;
      const to = $("to").value;
      const code = $("code").value.trim();

      if (!code) return showError("Please paste a booking code.");
      if (from === to) return showError("Pick two different bookmakers.");

      btn.disabled = true;
      btn.textContent = "Converting…";
      out.className = "result";

      try {
        const res = await fetch("/api/convert", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ from, to, code }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || "Conversion failed.");
        } else {
          showResult(data);
        }
      } catch {
        showError("Network error. Try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Convert";
      }
    }

    function showResult(data) {
      out.className = "result show";
      const meta = [
        data.events ? `${data.events} events` : null,
        data.odds ? `odds ${data.odds}` : null,
        `via ${data.provider}${data.cached ? " · cached" : ""}`,
      ].filter(Boolean).join(" · ");

      out.innerHTML = `
        <div style="font-size:.85rem;color:#475569;">New code on <strong>${data.bookmaker}</strong></div>
        <div class="code" id="newcode">${data.code}</div>
        <div class="meta">${meta}</div>
        <button class="copy" onclick="navigator.clipboard.writeText('${data.code}')">Copy code</button>
      `;
    }

    function showError(msg) {
      out.className = "result show error";
      out.textContent = msg;
    }
  </script>
</body>
</html>
